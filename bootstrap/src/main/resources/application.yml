spring:
  application:
    name: hl7-tcamt
    autoconfigure:
      exclude: org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  jmx:
    enabled: false
  security:
    account:
      role:
        default: "REGULAR"
    oauth2:
      client:
        registration:
          nist-okta:
            provider: nist-okta
            client-id: 0oath4j1kSlJV5Rjz0j6
            client-secret: QiGJlG7c-2aYn7XX8D9vIuina0Hbcs54lYCQ3LEqT22niz6HQSkTqSOSh7FO9Mre
            authorization-grant-type: authorization_code
            scope: openid,profile,email
        provider:
          nist-okta:
            issuer-uri: https://login.nist.gov
  main:
    allow-bean-definition-overriding: true

server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-stacktrace: never
  connection-timeout: 60000
  max-http-header-size: 8192
  tomcat:
    accesslog:
      directory: logs
      enabled: false
logging:
  level:
    ROOT: DEBUG

db:
  host: "127.0.0.1"
  port: 27017
  name: "tcl-v2"

key:
  public: /usr/local/etc/hit/auth/publicKey.txt

auth:
  url: http://localhost:8090

email:
  port: 25
  protocol: smtp
  host: smtp.nist.gov
  admin: robert.snelick@nist.gov
  from: hl7-tcamt@nist.gov
  subject: NIST HL7 Auth Notification

gvt:
  export-endpoint: api/cf/hl7v2/management/uploadZip
  create-domain-endpoint: api/domains/new
  domain-endpoint: api/domains/findByUser
  login-endpoint: api/accounts/login
  apps: GVT|https://hl7v2-gvt.nist.gov/gvt/;GVT-DEV|https://hit-dev.nist.gov:8099/gvt/;IZ-TOOL-DEV|https://hit-dev.nist.gov:8098/iztool/;IZ-TOOL|https://hl7v2-iz-r1-5-testing.nist.gov/iztool/

host:
  url: http://localhost:8090

hit:
  auth:
    role:
      default: "REGULAR"
    cookie:
      name: "tcamt-v2-auth"
      duration-minutes: 10

